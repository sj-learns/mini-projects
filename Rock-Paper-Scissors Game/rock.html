<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper Scissors</title>
    <link href="paper.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
    <header>
        <h1>Rock-Paper-Scissors</h1>
        <!-- ── Dark mode toggle ── -->
        <button class="dark-toggle" aria-label="Toggle dark mode">
            <i class="ti ti-moon" id="toggle-icon"></i>
            <span id="toggle-label">Dark mode</span>
        </button>
    </header>
    <div class="container">
        <div class="choice" id="Rock"><img src="images/rock3.jpg" alt="Rock"></div>
        <div class="choice" id="Paper"><img src="images/paper3.jpg" alt="Paper"></div>
        <div class="choice" id="Scissor"><img src="images/scissors3.jpg" alt="Scissors"></div>
    </div>
    <div class="scoreboard">
        <div class="score">
            <p id="user-score">0</p>
            <p id="label-you">You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p id="label-ai">AI</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>
    <div id="mode-reset">
        <select id="mode-select">
            <option value="3">Best of 3</option>
            <option value="5">Best of 5</option>
            <option value="7">Best of 7</option>
            <option value="10">Best of 10</option>
            <option value="99999">Endless</option>
        </select>
        <button class="reset"><i class="fa-solid fa-arrow-rotate-right fa-xl"></i></button>
    </div>
    <script src="scissor.js"></script>
</body>
</html>
