<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link href="tac.css" rel="stylesheet"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dark">
    <header class="header">
        <button id="theme" style="width: 32px; aspect-ratio: 1/1; display: inline-flex; align-items: center; justify-content: center; padding: 0;"><i style="color:white;" class="fa-solid fa-sun"></i></button>
        <h1>Tic-Tac-Toe</h1>
    </header>
    
    <div class="grid">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
    </div>
    <button id="reset" style="width: 32px; aspect-ratio: 1/1; display: inline-flex; align-items: center; justify-content: center; padding: 0;"><i class="fa-solid fa-arrow-rotate-right fa-xl"></i></button>
    <script src="toe.js"></script>
</body>
</html>
